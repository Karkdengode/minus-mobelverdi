name: Scrape og oppdater

on:
  schedule:
    - cron: '0 4 * * *'  # Hver dag kl. 04:00 UTC
  workflow_dispatch:      # Kan også kjøres manuelt

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Installer avhengigheter
        run: pip install requests beautifulsoup4 lxml

      - name: Kjør scraper
        run: python scripts/scrape.py

      - name: Commit og push hvis endringer
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git diff --cached --quiet || git commit -m "Auto-oppdater data $(date '+%Y-%m-%d')"
          git push
